<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ccproxy — OAuth Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warn: #d29922;
      --danger: #f85149;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 { font-size: 18px; font-weight: 600; color: var(--accent); }
    #refresh-status { font-size: 12px; color: var(--text-muted); }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h2 { font-size: 15px; font-weight: 600; }

    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Table */
    .table-scroll { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; }

    th, td {
      text-align: left;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    th {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--surface2);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(88,166,255,0.04); }

    .chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .chip-success { background: rgba(63,185,80,.15); color: var(--success); }
    .chip-warn    { background: rgba(210,153,34,.15); color: var(--warn); }
    .chip-danger  { background: rgba(248,81,73,.15);  color: var(--danger); }
    .chip-muted   { background: var(--surface2); color: var(--text-muted); }

    .empty-row td { text-align: center; color: var(--text-muted); padding: 24px; }

    .actions { display: flex; gap: 6px; }

    .btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: var(--border); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(248,81,73,.15); }
    .btn-accent { border-color: var(--accent); color: var(--accent); }
    .btn-accent:hover { background: rgba(88,166,255,.15); }
    .btn-ok   { border-color: var(--success); color: var(--success); }
    .btn-fail { border-color: var(--danger);  color: var(--danger); }

    /* Utilization bars */
    .util-bars { display: flex; flex-direction: column; gap: 3px; }
    .util-bar-row { display: flex; align-items: center; gap: 6px; }
    .util-label { font-size: 11px; color: var(--text-muted); width: 14px; flex-shrink: 0; }
    .util-track { width: 80px; height: 4px; background: var(--border); border-radius: 2px; flex-shrink: 0; }
    .util-fill { height: 100%; border-radius: 2px; background: var(--success); transition: width 0.3s; }
    .util-fill.warn { background: var(--warn); }
    .util-fill.danger { background: var(--danger); }
    .util-pct { font-size: 11px; color: var(--text-muted); width: 28px; }
    .util-state { margin-top: 3px; }

    /* Proxy cell */
    .proxy-cell { min-width: 120px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .proxy-placeholder { color: var(--text-muted); font-size: 12px; font-style: italic; }
    .proxy-edit-btn { display: none; }

    .inline-name-input, .inline-proxy-input {
      width: 100%;
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--accent);
      border-radius: 4px;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    .inline-name-input { font-weight: 600; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 480px;
      max-width: 100%;
    }

    .modal h3 { margin-bottom: 16px; font-size: 16px; }
    .modal p { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }

    .modal input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .modal input[type="text"]:focus { outline: none; border-color: var(--accent); }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .modal-status { font-size: 12px; margin-bottom: 12px; min-height: 18px; }
    .modal-status.error { color: var(--danger); }
    .modal-status.ok { color: var(--success); }

    /* ── Mobile card layout (< 640px) ──────────────────── */
    @media (max-width: 639px) {
      header { padding: 10px 12px; }
      .container { padding: 12px 8px; }
      .table-scroll { overflow-x: visible; }

      /* Hide table headers */
      .accounts-table thead { display: none; }

      /* Each row becomes a card */
      .accounts-table tbody tr {
        display: block;
        border: 1px solid var(--border);
        border-radius: 8px;
        margin-bottom: 10px;
        overflow: hidden;
      }

      /* Undo PC "last row no border" */
      .accounts-table tr:last-child td { border-bottom: 1px solid var(--border); }
      .accounts-table tr:hover td { background: transparent; }

      /* Each cell is a label–value flex row */
      .accounts-table td {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        white-space: normal;
      }

      /* Label prefix via data-label */
      .accounts-table td[data-label]::before {
        content: attr(data-label);
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.4px;
        font-weight: 500;
        flex-shrink: 0;
        min-width: 56px;
        margin-right: 8px;
      }

      /* Name cell — card header style */
      .accounts-table td.td-name {
        background: var(--surface2);
        font-size: 15px;
        justify-content: flex-start;
        gap: 10px;
      }
      .accounts-table td.td-name::before { display: none; }

      /* Actions cell */
      .accounts-table td.td-actions {
        background: var(--surface2);
        justify-content: flex-end;
        border-bottom: none;
        gap: 8px;
      }
      .accounts-table td.td-actions::before { display: none; }
      .accounts-table td.td-actions .btn { padding: 8px 16px; font-size: 13px; }

      /* Proxy cell — show edit button, disable dblclick hint */
      .accounts-table td.td-proxy { cursor: default; }
      .proxy-edit-btn { display: inline-block; flex-shrink: 0; }

      /* Budget cell — stack bars vertically, full width */
      .accounts-table td.td-budget { flex-direction: column; align-items: flex-start; gap: 6px; }
      .accounts-table td.td-budget::before { margin-bottom: 2px; }
      .accounts-table td.td-budget .util-bars { width: 100%; }
      .accounts-table td.td-budget .util-track { flex: 1; width: auto; min-width: 80px; }

      /* Hide Refresh on mobile */
      .btn-refresh { display: none !important; }
    }
  </style>
</head>
<body>

<header>
  <h1>ccproxy OAuth</h1>
  <span id="refresh-status">Loading…</span>
</header>

<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>OAuth Accounts</h2>
      <div style="display:flex; gap:8px; align-items:center;">
        <span class="badge" id="account-count">—</span>
        <button class="btn btn-accent" onclick="addInlineAccount()">+ Add Claude</button>
      </div>
    </div>
    <div class="table-scroll">
      <table class="accounts-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Proxy</th>
            <th>Account Status</th>
            <th>Token Status</th>
            <th>Expires At</th>
            <th>Budget</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="accounts-body">
          <tr class="empty-row"><td colspan="7">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- OAuth Login Modal -->
<div class="modal-overlay" id="login-modal">
  <div class="modal">
    <h3>OAuth Login — <span id="modal-account"></span></h3>
    <p>Open the authorization URL below, approve access, then paste the returned code or URL here.</p>
    <div class="modal-status" id="modal-status"></div>
    <div id="auth-url-box" style="display:none; margin-bottom:12px;">
      <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:4px;">Authorization URL</label>
      <div style="display:flex; gap:6px; align-items:center;">
        <input type="text" id="auth-url" readonly style="flex:1; margin-bottom:0; cursor:text; font-size:12px; color:var(--accent);" />
        <button class="btn btn-accent" onclick="copyAuthURL()" id="copy-btn" style="white-space:nowrap;">Copy</button>
        <a id="auth-url-link" href="#" target="_blank" rel="noopener" class="btn btn-accent" style="text-decoration:none; text-align:center; white-space:nowrap;">Open</a>
      </div>
    </div>
    <input type="text" id="modal-code" placeholder="Paste authorization code or callback URL here…" />
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" id="modal-submit" onclick="submitCode()">Submit</button>
    </div>
  </div>
</div>

<script>
  let currentSessionId = null;

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function tokenChip(status) {
    const map = {
      'valid': 'chip-success',
      'expiring soon': 'chip-warn',
      'expired': 'chip-danger',
      'no token': 'chip-muted',
    };
    return '<span class="chip ' + (map[status] || 'chip-muted') + '">' + esc(status || '—') + '</span>';
  }

  function accountStatusChip(acct) {
    const status = acct.health || 'healthy';
    const map = {
      'banned':   { cls: 'chip-danger', label: 'Banned' },
      'cooldown': { cls: 'chip-warn',   label: 'Cooling down' },
      'healthy':  { cls: 'chip-success',label: 'Healthy' },
      'disabled': { cls: 'chip-muted',  label: 'Disabled' },
    };
    const meta = map[status] || map['disabled'];
    const reason = acct.ban_reason || acct.disabled_reason || '';
    const title = reason ? ' title="' + esc(reason) + '"' : '';
    return '<span class="chip ' + meta.cls + '"' + title + '>' + meta.label + '</span>';
  }

  function fmtExpiry(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString([], { hour12: false, month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  }

  function utilFillClass(util) {
    if (util >= 0.9) return ' danger';
    if (util >= 0.7) return ' warn';
    return '';
  }

  function utilBarsHTML(acct) {
    var h5 = Math.round((acct.util_5h || 0) * 100);
    var h7 = Math.round((acct.util_7d || 0) * 100);
    var c5 = utilFillClass(acct.util_5h || 0);
    var c7 = utilFillClass(acct.util_7d || 0);
    var state = acct.budget_state || 'normal';
    var stateCls = { normal: 'chip-success', sticky_only: 'chip-warn', blocked: 'chip-danger' }[state] || 'chip-muted';
    var stateLabel = { normal: 'Normal', sticky_only: 'Sticky', blocked: 'Blocked' }[state] || state;
    return '<div class="util-bars">' +
      '<div class="util-bar-row">' +
        '<span class="util-label">5h</span>' +
        '<div class="util-track"><div class="util-fill' + c5 + '" style="width:' + h5 + '%"></div></div>' +
        '<span class="util-pct">' + h5 + '%</span>' +
      '</div>' +
      '<div class="util-bar-row">' +
        '<span class="util-label">7d</span>' +
        '<div class="util-track"><div class="util-fill' + c7 + '" style="width:' + h7 + '%"></div></div>' +
        '<span class="util-pct">' + h7 + '%</span>' +
      '</div>' +
      '<span class="chip ' + stateCls + ' util-state">' + stateLabel + '</span>' +
    '</div>';
  }

  var PROXY_HINT = 'socks5://user:password@ip:port';

  function renderAccounts(data) {
    document.getElementById('account-count').textContent = data.length + ' accounts';
    const tbody = document.getElementById('accounts-body');
    if (!data.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="7">No OAuth accounts configured</td></tr>';
      return;
    }
    tbody.innerHTML = '';
    data.forEach(function(acct) {
      var tr = document.createElement('tr');

      // Name cell (card header on mobile)
      var tdName = document.createElement('td');
      tdName.className = 'td-name';
      var strong = document.createElement('strong');
      strong.textContent = acct.name;
      tdName.appendChild(strong);
      tr.appendChild(tdName);

      // Proxy cell
      var tdProxy = document.createElement('td');
      tdProxy.className = 'proxy-cell td-proxy';
      tdProxy.dataset.label = 'Proxy';
      if (acct.proxy) {
        tdProxy.appendChild(document.createTextNode(acct.proxy));
      } else {
        var placeholder = document.createElement('span');
        placeholder.className = 'proxy-placeholder';
        placeholder.textContent = PROXY_HINT;
        tdProxy.appendChild(placeholder);
      }
      // Mobile: tap-to-edit button
      var proxyEditBtn = document.createElement('button');
      proxyEditBtn.className = 'btn proxy-edit-btn';
      proxyEditBtn.textContent = 'Edit';
      proxyEditBtn.addEventListener('click', (function(name, td) {
        return function(e) { e.stopPropagation(); editProxy(name, td); };
      })(acct.name, tdProxy));
      tdProxy.appendChild(proxyEditBtn);
      // PC: double-click to edit
      tdProxy.addEventListener('dblclick', (function(name, td) {
        return function() { editProxy(name, td); };
      })(acct.name, tdProxy));
      tr.appendChild(tdProxy);

      // Account status cell
      var tdAccountStatus = document.createElement('td');
      tdAccountStatus.className = 'td-account-status';
      tdAccountStatus.dataset.label = 'Status';
      tdAccountStatus.innerHTML = accountStatusChip(acct);
      tr.appendChild(tdAccountStatus);

      // Token status cell
      var tdStatus = document.createElement('td');
      tdStatus.className = 'td-token-status';
      tdStatus.dataset.label = 'Token';
      tdStatus.innerHTML = tokenChip(acct.token_status);
      tr.appendChild(tdStatus);

      // Expires at cell
      var tdExpiry = document.createElement('td');
      tdExpiry.className = 'td-expiry';
      tdExpiry.dataset.label = 'Expires';
      tdExpiry.textContent = fmtExpiry(acct.token_expires_at);
      tr.appendChild(tdExpiry);

      // Budget cell
      var tdBudget = document.createElement('td');
      tdBudget.className = 'td-budget';
      tdBudget.dataset.label = 'Budget';
      tdBudget.innerHTML = utilBarsHTML(acct);
      tr.appendChild(tdBudget);

      // Actions cell
      var tdActions = document.createElement('td');
      tdActions.className = 'td-actions';
      var actionsDiv = document.createElement('div');
      actionsDiv.className = 'actions';

      var loginBtn = document.createElement('button');
      loginBtn.className = 'btn btn-accent';
      loginBtn.textContent = 'Login';
      loginBtn.addEventListener('click', (function(name) {
        return function() { startLogin(name); };
      })(acct.name));
      actionsDiv.appendChild(loginBtn);

      var testBtn = document.createElement('button');
      testBtn.className = 'btn';
      testBtn.textContent = 'Test';
      testBtn.addEventListener('click', (function(name, btn) {
        return function() { doTest(name, btn); };
      })(acct.name, testBtn));
      actionsDiv.appendChild(testBtn);

      if (acct.token_status !== 'no token') {
        var refreshBtn = document.createElement('button');
        refreshBtn.className = 'btn btn-refresh';
        refreshBtn.textContent = 'Refresh';
        refreshBtn.addEventListener('click', (function(name) {
          return function() { doRefresh(name); };
        })(acct.name));
        actionsDiv.appendChild(refreshBtn);
      }

      var removeBtn = document.createElement('button');
      removeBtn.className = 'btn btn-danger';
      removeBtn.textContent = 'Remove';
      removeBtn.addEventListener('click', (function(name) {
        return function() { doRemove(name); };
      })(acct.name));
      actionsDiv.appendChild(removeBtn);

      tdActions.appendChild(actionsDiv);
      tr.appendChild(tdActions);

      tbody.appendChild(tr);
    });
  }

  async function fetchJSON(url, opts) {
    const res = await fetch(url, opts);
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || 'HTTP ' + res.status);
    return body;
  }

  async function refresh() {
    const el = document.getElementById('refresh-status');
    el.textContent = 'Refreshing…';
    try {
      const data = await fetchJSON('/api/accounts');
      renderAccounts(data);
      el.textContent = 'Updated ' + new Date().toLocaleTimeString([], { hour12: false });
    } catch (err) {
      el.textContent = 'Error: ' + err.message;
    }
  }

  // --- OAuth Actions ---

  async function startLogin(accountName) {
    const statusEl = document.getElementById('modal-status');
    const codeInput = document.getElementById('modal-code');
    const urlBox = document.getElementById('auth-url-box');
    const urlInput = document.getElementById('auth-url');
    const urlLink = document.getElementById('auth-url-link');
    codeInput.value = '';
    statusEl.textContent = '';
    statusEl.className = 'modal-status';
    urlBox.style.display = 'none';
    document.getElementById('modal-account').textContent = accountName;
    document.getElementById('login-modal').classList.add('active');

    try {
      const resp = await fetchJSON('/api/oauth/login/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ account: accountName }),
      });
      currentSessionId = resp.session_id;
      urlInput.value = resp.authorization_url;
      urlLink.href = resp.authorization_url;
      urlBox.style.display = 'block';
      statusEl.textContent = 'Copy or click the URL to authorize, then paste the code below.';
    } catch (err) {
      statusEl.textContent = 'Error: ' + err.message;
      statusEl.className = 'modal-status error';
    }
  }

  function copyAuthURL() {
    const urlInput = document.getElementById('auth-url');
    const btn = document.getElementById('copy-btn');
    var text = urlInput.value;

    function onSuccess() {
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
    }

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(onSuccess).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }

    function fallbackCopy() {
      urlInput.select();
      urlInput.setSelectionRange(0, text.length);
      try {
        document.execCommand('copy');
        onSuccess();
      } catch (e) {
        btn.textContent = 'Failed';
        setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
      }
    }
  }

  async function submitCode() {
    const code = document.getElementById('modal-code').value.trim();
    const statusEl = document.getElementById('modal-status');
    if (!code) {
      statusEl.textContent = 'Please paste the authorization code.';
      statusEl.className = 'modal-status error';
      return;
    }

    const btn = document.getElementById('modal-submit');
    btn.disabled = true;
    statusEl.textContent = 'Exchanging code…';
    statusEl.className = 'modal-status';

    try {
      await fetchJSON('/api/oauth/login/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: currentSessionId, code: code }),
      });
      statusEl.textContent = 'Login successful!';
      statusEl.className = 'modal-status ok';
      setTimeout(function() { closeModal(); refresh(); }, 1000);
    } catch (err) {
      statusEl.textContent = 'Error: ' + err.message;
      statusEl.className = 'modal-status error';
    } finally {
      btn.disabled = false;
    }
  }

  function closeModal() {
    document.getElementById('login-modal').classList.remove('active');
    currentSessionId = null;
  }

  async function doRefresh(accountName) {
    if (!confirm('Force refresh token for ' + esc(accountName) + '?')) return;
    try {
      await fetchJSON('/api/oauth/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ account: accountName }),
      });
      refresh();
    } catch (err) {
      alert('Refresh failed: ' + err.message);
    }
  }

  async function doTest(accountName, btn) {
    btn.disabled = true;
    btn.textContent = 'Testing…';
    btn.className = 'btn';
    try {
      const data = await fetchJSON('/api/accounts/test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ account: accountName }),
      });
      btn.textContent = '✓ OK';
      btn.className = 'btn btn-ok';
      setTimeout(function() { btn.textContent = 'Test'; btn.className = 'btn'; btn.disabled = false; }, 30000);
    } catch (err) {
      btn.textContent = '✗ Fail';
      btn.className = 'btn btn-fail';
      btn.title = err.message;
      btn.onclick = function() { alert(err.message); };
      setTimeout(function() { btn.textContent = 'Test'; btn.className = 'btn'; btn.title = ''; btn.onclick = null; btn.disabled = false; }, 30000);
    }
  }

  // --- Proxy Inline Edit ---

  function isValidProxy(s) {
    try {
      var u = new URL(s);
      return u.protocol === 'socks5:' && u.hostname && u.port;
    } catch (e) {
      return false;
    }
  }

  function editProxy(accountName, td) {
    if (td.querySelector('.inline-proxy-input')) return;

    // Exclude the edit button text from "current value"
    var current = '';
    td.childNodes.forEach(function(node) {
      if (node.nodeType === Node.TEXT_NODE) current += node.textContent.trim();
    });

    td.innerHTML = '<input class="inline-proxy-input" type="text" placeholder="' + esc(PROXY_HINT) + '" value="' + esc(current) + '" />';
    var input = td.querySelector('.inline-proxy-input');
    input.focus();
    input.select();

    var saving = false;

    async function save() {
      if (saving) return;
      var val = input.value.trim();
      if (val === '') {
        saving = true;
        await submitProxy(accountName, '', td);
        return;
      }
      if (!isValidProxy(val)) {
        input.style.borderColor = 'var(--danger)';
        return;
      }
      saving = true;
      await submitProxy(accountName, val, td);
    }

    function cancel() {
      if (current) {
        td.innerHTML = esc(current) + '<button class="btn proxy-edit-btn">Edit</button>';
      } else {
        td.innerHTML = '<span class="proxy-placeholder">' + esc(PROXY_HINT) + '</span><button class="btn proxy-edit-btn">Edit</button>';
      }
      // Re-attach edit button listener
      td.querySelector('.proxy-edit-btn').addEventListener('click', function(e) {
        e.stopPropagation(); editProxy(accountName, td);
      });
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); save(); }
      if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });
    input.addEventListener('blur', function() {
      setTimeout(function() { if (!saving) cancel(); }, 150);
    });
  }

  async function submitProxy(accountName, proxy, td) {
    try {
      await fetchJSON('/api/accounts/proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: accountName, proxy: proxy }),
      });
      refresh();
    } catch (err) {
      alert('Update proxy failed: ' + err.message);
      refresh();
    }
  }

  // --- Add / Remove Account ---

  function addInlineAccount() {
    const tbody = document.getElementById('accounts-body');
    const emptyRow = tbody.querySelector('.empty-row');
    if (emptyRow) emptyRow.remove();
    if (tbody.querySelector('.inline-add-row')) {
      tbody.querySelector('.inline-name-input').focus();
      return;
    }
    const tr = document.createElement('tr');
    tr.className = 'inline-add-row';
    tr.innerHTML =
      '<td class="td-name"><input class="inline-name-input" type="text" placeholder="Account name…" /></td>' +
      '<td class="td-proxy" data-label="Proxy"><span class="proxy-placeholder">' + esc(PROXY_HINT) + '</span></td>' +
      '<td class="td-account-status" data-label="Status"><span class="chip chip-muted">—</span></td>' +
      '<td class="td-token-status" data-label="Token"><span class="chip chip-muted">—</span></td>' +
      '<td class="td-expiry" data-label="Expires">—</td>' +
      '<td class="td-budget" data-label="Budget"></td>' +
      '<td class="td-actions"><div class="actions">' +
        '<button class="btn btn-accent inline-save-btn">Save</button>' +
        '<button class="btn inline-cancel-btn">Cancel</button>' +
      '</div></td>';
    tbody.insertBefore(tr, tbody.firstChild);

    const input = tr.querySelector('.inline-name-input');
    input.focus();

    async function saveInline() {
      const name = input.value.trim();
      if (!name) { input.style.borderColor = 'var(--danger)'; return; }
      const saveBtn = tr.querySelector('.inline-save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Adding…';
      try {
        await fetchJSON('/api/accounts/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: name }),
        });
        refresh();
      } catch (err) {
        input.style.borderColor = 'var(--danger)';
        saveBtn.textContent = 'Save';
        saveBtn.disabled = false;
        alert('Add failed: ' + err.message);
      }
    }

    function cancelInline() {
      tr.remove();
      if (!tbody.children.length) refresh();
    }

    tr.querySelector('.inline-save-btn').addEventListener('click', saveInline);
    tr.querySelector('.inline-cancel-btn').addEventListener('click', cancelInline);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') saveInline();
      if (e.key === 'Escape') cancelInline();
    });
  }

  async function doRemove(accountName) {
    if (!confirm('Remove account "' + esc(accountName) + '"? This will also delete its OAuth token.')) return;
    try {
      await fetchJSON('/api/accounts/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: accountName }),
      });
      refresh();
    } catch (err) {
      alert('Remove failed: ' + err.message);
    }
  }

  // --- Init ---
  refresh();
  setInterval(refresh, 30000);
</script>
</body>
</html>
