<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ccproxy — OAuth Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warn: #d29922;
      --danger: #f85149;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 { font-size: 18px; font-weight: 600; color: var(--accent); }
    #refresh-status { font-size: 12px; color: var(--text-muted); }

    .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-header h2 { font-size: 15px; font-weight: 600; }

    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      color: var(--text-muted);
    }

    table { width: 100%; border-collapse: collapse; }

    th, td {
      text-align: left;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    th {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      background: var(--surface2);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(88,166,255,0.04); }

    .chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    .chip-success { background: rgba(63,185,80,.15); color: var(--success); }
    .chip-warn    { background: rgba(210,153,34,.15); color: var(--warn); }
    .chip-danger  { background: rgba(248,81,73,.15);  color: var(--danger); }
    .chip-muted   { background: var(--surface2); color: var(--text-muted); }

    .empty-row td { text-align: center; color: var(--text-muted); padding: 24px; }

    .actions { display: flex; gap: 6px; }

    .btn {
      padding: 4px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover { background: var(--border); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: rgba(248,81,73,.15); }
    .btn-accent { border-color: var(--accent); color: var(--accent); }
    .btn-accent:hover { background: rgba(88,166,255,.15); }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 480px;
      max-width: 90vw;
    }

    .modal h3 { margin-bottom: 16px; font-size: 16px; }
    .modal p { color: var(--text-muted); font-size: 13px; margin-bottom: 12px; }

    .modal input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      margin-bottom: 12px;
    }

    .modal input[type="text"]:focus { outline: none; border-color: var(--accent); }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .modal-status { font-size: 12px; margin-bottom: 12px; min-height: 18px; }
    .modal-status.error { color: var(--danger); }
    .modal-status.ok { color: var(--success); }

    @media (max-width: 640px) {
      .container { padding: 12px 8px; }
      header { padding: 10px 12px; }
      th, td { padding: 8px 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1>ccproxy OAuth</h1>
  <span id="refresh-status">Loading…</span>
</header>

<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>OAuth Instances</h2>
      <div style="display:flex; gap:8px; align-items:center;">
        <span class="badge" id="instance-count">—</span>
        <button class="btn btn-accent" onclick="showAddModal()">+ Add Claude</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Token Status</th>
            <th>Expires At</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="instances-body">
          <tr class="empty-row"><td colspan="4">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add Instance Modal -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>Add Claude Instance</h3>
    <p>Enter a name for the new instance (e.g. your account name).</p>
    <div class="modal-status" id="add-modal-status"></div>
    <input type="text" id="add-instance-name" placeholder="Instance name…" />
    <div class="modal-actions">
      <button class="btn" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-accent" id="add-modal-submit" onclick="submitAddInstance()">Add</button>
    </div>
  </div>
</div>

<!-- Login Modal -->
<div class="modal-overlay" id="login-modal">
  <div class="modal">
    <h3>OAuth Login — <span id="modal-instance"></span></h3>
    <p>Open the authorization URL below, approve access, then paste the returned code or URL here.</p>
    <div class="modal-status" id="modal-status"></div>
    <div id="auth-url-box" style="display:none; margin-bottom:12px;">
      <label style="font-size:12px; color:var(--text-muted); display:block; margin-bottom:4px;">Authorization URL</label>
      <div style="display:flex; gap:6px; align-items:center;">
        <input type="text" id="auth-url" readonly style="flex:1; margin-bottom:0; cursor:text; font-size:12px; color:var(--accent);" />
        <button class="btn btn-accent" onclick="copyAuthURL()" id="copy-btn" style="white-space:nowrap;">Copy</button>
        <a id="auth-url-link" href="#" target="_blank" rel="noopener" class="btn btn-accent" style="text-decoration:none; text-align:center; white-space:nowrap;">Open</a>
      </div>
    </div>
    <input type="text" id="modal-code" placeholder="Paste authorization code or callback URL here…" />
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" id="modal-submit" onclick="submitCode()">Submit</button>
    </div>
  </div>
</div>

<script>
  let currentSessionId = null;

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function tokenChip(status) {
    const map = {
      'valid': 'chip-success',
      'expiring soon': 'chip-warn',
      'expired': 'chip-danger',
      'no token': 'chip-muted',
    };
    return '<span class="chip ' + (map[status] || 'chip-muted') + '">' + esc(status || '—') + '</span>';
  }

  function fmtExpiry(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return d.toLocaleString([], { hour12: false, month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  }

  function actionButtons(inst) {
    const name = esc(inst.name);
    let html = '<div class="actions">';
    if (inst.token_status === 'no token') {
      html += '<button class="btn btn-accent" onclick="startLogin(\'' + name + '\')">Login</button>';
    } else {
      html += '<button class="btn btn-accent" onclick="startLogin(\'' + name + '\')">Login</button>';
      html += '<button class="btn" onclick="doRefresh(\'' + name + '\')">Refresh</button>';
    }
    html += '<button class="btn btn-danger" onclick="doRemove(\'' + name + '\')">Remove</button>';
    html += '</div>';
    return html;
  }

  function renderInstances(data) {
    document.getElementById('instance-count').textContent = data.length + ' instances';
    const tbody = document.getElementById('instances-body');
    if (!data.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="4">No OAuth instances configured</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(function(inst) {
      return '<tr>' +
        '<td><strong>' + esc(inst.name) + '</strong></td>' +
        '<td>' + tokenChip(inst.token_status) + '</td>' +
        '<td>' + fmtExpiry(inst.token_expires_at) + '</td>' +
        '<td>' + actionButtons(inst) + '</td>' +
        '</tr>';
    }).join('');
  }

  async function fetchJSON(url, opts) {
    const res = await fetch(url, opts);
    const body = await res.json();
    if (!res.ok) throw new Error(body.error || 'HTTP ' + res.status);
    return body;
  }

  async function refresh() {
    const el = document.getElementById('refresh-status');
    el.textContent = 'Refreshing…';
    try {
      const data = await fetchJSON('/api/instances');
      renderInstances(data);
      el.textContent = 'Updated ' + new Date().toLocaleTimeString([], { hour12: false });
    } catch (err) {
      el.textContent = 'Error: ' + err.message;
    }
  }

  // --- OAuth Actions ---

  async function startLogin(instanceName) {
    const statusEl = document.getElementById('modal-status');
    const codeInput = document.getElementById('modal-code');
    const urlBox = document.getElementById('auth-url-box');
    const urlInput = document.getElementById('auth-url');
    const urlLink = document.getElementById('auth-url-link');
    codeInput.value = '';
    statusEl.textContent = '';
    statusEl.className = 'modal-status';
    urlBox.style.display = 'none';
    document.getElementById('modal-instance').textContent = instanceName;
    document.getElementById('login-modal').classList.add('active');

    try {
      const resp = await fetchJSON('/api/oauth/login/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ instance: instanceName }),
      });
      currentSessionId = resp.session_id;
      urlInput.value = resp.authorization_url;
      urlLink.href = resp.authorization_url;
      urlBox.style.display = 'block';
      statusEl.textContent = 'Copy or click the URL to authorize, then paste the code below.';
    } catch (err) {
      statusEl.textContent = 'Error: ' + err.message;
      statusEl.className = 'modal-status error';
    }
  }

  function copyAuthURL() {
    const urlInput = document.getElementById('auth-url');
    const btn = document.getElementById('copy-btn');
    var text = urlInput.value;

    function onSuccess() {
      btn.textContent = 'Copied!';
      setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
    }

    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(onSuccess).catch(fallbackCopy);
    } else {
      fallbackCopy();
    }

    function fallbackCopy() {
      urlInput.select();
      urlInput.setSelectionRange(0, text.length);
      try {
        document.execCommand('copy');
        onSuccess();
      } catch (e) {
        btn.textContent = 'Failed';
        setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
      }
    }
  }

  async function submitCode() {
    const code = document.getElementById('modal-code').value.trim();
    const statusEl = document.getElementById('modal-status');
    if (!code) {
      statusEl.textContent = 'Please paste the authorization code.';
      statusEl.className = 'modal-status error';
      return;
    }

    const btn = document.getElementById('modal-submit');
    btn.disabled = true;
    statusEl.textContent = 'Exchanging code…';
    statusEl.className = 'modal-status';

    try {
      await fetchJSON('/api/oauth/login/complete', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: currentSessionId, code: code }),
      });
      statusEl.textContent = 'Login successful!';
      statusEl.className = 'modal-status ok';
      setTimeout(function() { closeModal(); refresh(); }, 1000);
    } catch (err) {
      statusEl.textContent = 'Error: ' + err.message;
      statusEl.className = 'modal-status error';
    } finally {
      btn.disabled = false;
    }
  }

  function closeModal() {
    document.getElementById('login-modal').classList.remove('active');
    currentSessionId = null;
  }

  async function doRefresh(instanceName) {
    if (!confirm('Force refresh token for ' + instanceName + '?')) return;
    try {
      await fetchJSON('/api/oauth/refresh', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ instance: instanceName }),
      });
      refresh();
    } catch (err) {
      alert('Refresh failed: ' + err.message);
    }
  }


  // --- Add / Remove Instance ---

  function showAddModal() {
    document.getElementById('add-instance-name').value = '';
    document.getElementById('add-modal-status').textContent = '';
    document.getElementById('add-modal-status').className = 'modal-status';
    document.getElementById('add-modal').classList.add('active');
    document.getElementById('add-instance-name').focus();
  }

  function closeAddModal() {
    document.getElementById('add-modal').classList.remove('active');
  }

  async function submitAddInstance() {
    const name = document.getElementById('add-instance-name').value.trim();
    const statusEl = document.getElementById('add-modal-status');
    if (!name) {
      statusEl.textContent = 'Please enter a name.';
      statusEl.className = 'modal-status error';
      return;
    }
    const btn = document.getElementById('add-modal-submit');
    btn.disabled = true;
    statusEl.textContent = 'Adding…';
    statusEl.className = 'modal-status';
    try {
      await fetchJSON('/api/instances/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name }),
      });
      statusEl.textContent = 'Added!';
      statusEl.className = 'modal-status ok';
      setTimeout(function() { closeAddModal(); refresh(); }, 600);
    } catch (err) {
      statusEl.textContent = 'Error: ' + err.message;
      statusEl.className = 'modal-status error';
    } finally {
      btn.disabled = false;
    }
  }

  async function doRemove(instanceName) {
    if (!confirm('Remove instance "' + instanceName + '"? This will also delete its OAuth token.')) return;
    try {
      await fetchJSON('/api/instances/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: instanceName }),
      });
      refresh();
    } catch (err) {
      alert('Remove failed: ' + err.message);
    }
  }

  // --- Init ---
  refresh();
  setInterval(refresh, 30000);
</script>
</body>
</html>
