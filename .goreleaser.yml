version: 2

builds:
  - id: ccproxy
    main: ./cmd/ccproxy
    binary: ccproxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/binn/ccproxy/internal/cli.Version={{.Version}}

archives:
  - id: ccproxy
    builds:
      - ccproxy
    name_template: "ccproxy_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

release:
  github:
    owner: shuzuan-org
    name: ccproxy
  draft: false
  prerelease: auto
